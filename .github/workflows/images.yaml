name: Build images
on:
  push:
jobs:
  render-pcb-images:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Render 3D animation
        run: |
          docker run --rm -v ${{ github.workspace }}:/pwd \
            -v ${{ github.workspace }}/scripts/kicad_animation.sh:/usr/bin/kicad_animation.sh \
            ghcr.io/linalinn/kicad-render:10 \
            bash -c "chmod +x /usr/bin/kicad_animation.sh && kicad_animation.sh gif \
            'kirawnik.kicad_pcb' \
            '/pwd/site'"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: animation
          path: ${{ github.workspace }}/site
          retention-days: 1

  combine-and-deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: render-pcb-images

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: animation
          path: site

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Combined Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
